name: Modal Deploy

on:
  workflow_dispatch:
    inputs:
      modal_region:
        description: "可选：指定 Modal 运行区域（例如 us-east、ap-northeast-1）。多个区域用英文逗号分隔。留空表示不固定区域（默认调度）。参考：https://modal.com/docs/guide/region-selection#region-options"
        required: false
        default: ""
      modal_nonpreemptible:
        description: "可选：启用非抢占（non-preemptible）。开启后可以固定IP，CPU/内存成本更高。参考：https://modal.com/docs/guide/preemption#non-preemptible-functions"
        required: false
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Deploy with Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          MODAL_REGION: ${{ inputs.modal_region }}
          MODAL_NONPREEMPTIBLE: ${{ inputs.modal_nonpreemptible }}
        run: |
          set -euo pipefail
          modal deploy main.py
