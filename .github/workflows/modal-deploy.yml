name: Modal Deploy

on:
  workflow_dispatch:
    inputs:
      modal_region:
        description: "Optional Modal region (e.g. us-east, ap-northeast-1). Comma-separated for multiple. Empty = default scheduling."
        required: false
        default: ""
      modal_nonpreemptible:
        description: "Non-preemptible workers (higher CPU/memory cost; see Modal docs)."
        required: false
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install modal

      - name: Deploy with Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          MODAL_REGION: ${{ inputs.modal_region }}
          MODAL_NONPREEMPTIBLE: ${{ inputs.modal_nonpreemptible }}
        run: |
          set -euo pipefail
          modal deploy main.py
